<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebBashIDE Pro Mobile</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* Ajustes CodeMirror para Mobile */
        .cm-editor { height: 100%; font-size: 14px; }
        .cm-scroller { font-family: 'Fira Code', monospace !important; }
        
        /* Esconder scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Terminal estilo retrô */
        #terminal-container {
            background: #09090b;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        
        body { touch-action: manipulation; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 h-screen flex flex-col overflow-hidden">

    <nav class="bg-[#0f172a] border-b border-slate-800 px-4 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-terminal text-cyan-400"></i>
            <h1 class="font-bold text-sm tracking-tight uppercase">WebBash<span class="text-cyan-400">IDE</span></h1>
        </div>
        <div class="flex gap-3">
            <button onclick="showHistory()" class="p-2 text-slate-400 hover:text-white transition">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </button>
            <button onclick="saveScript()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> <span class="hidden sm:inline">SALVAR</span>
            </button>
            <button onclick="runWSH()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 px-4 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-2">
                <i class="fa-solid fa-play"></i> <span class="hidden sm:inline">RODAR</span>
            </button>
        </div>
    </nav>

    <div class="flex-1 overflow-hidden relative border-b border-slate-800" id="editor-parent">
        </div>

    <div id="terminal-container" class="h-1/3 flex flex-col shrink-0">
        <div class="bg-slate-900/50 px-4 py-1 flex justify-between items-center border-b border-slate-800">
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Console Output</span>
            <button onclick="clearTerminal()" class="text-[10px] text-slate-500 hover:text-red-400">
                <i class="fa-solid fa-trash-can"></i> LIMPAR
            </button>
        </div>
        <div id="terminal-output" class="flex-1 p-4 font-mono text-xs overflow-y-auto no-scrollbar text-emerald-400 leading-relaxed">
            <span class="text-slate-500"># WebBashIDE ready. Escreva o seu código .websh acima.</span><br>
        </div>
    </div>

    <script type="module">
        import { createEditor } from "https://esm.sh/@uiview/codemirror-ts-bundle";
        
        // Configuração do Editor
        const parent = document.getElementById('editor-parent');
        const initialCode = `#!/usr/bin/env websh\n# Script WSH para Mobile\n\necho "Verificando InfoSystem..."\nfetch http://localhost:5000/api/info\n\necho "Sistema Pronto."`;

        window.editor = createEditor(parent, initialCode, "javascript"); // Usando JS highlighter como fallback para .websh
    </script>

    <script>
        let db;

        // Iniciar IndexedDB
        const initDB = () => {
            const request = indexedDB.open("WebBashIDE_MobileDB", 1);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                db.createObjectStore("wsh_scripts", { keyPath: "id", autoIncrement: true });
            };
            request.onsuccess = (e) => db = e.target.result;
        };

        // Salvar Script com SweetAlert2
        async function saveScript() {
            const { value: fileName } = await Swal.fire({
                title: 'Salvar Versão',
                input: 'text',
                inputLabel: 'Nome do script ou versão',
                inputValue: 'script_v1.websh',
                showCancelButton: true,
                background: '#0f172a',
                color: '#f1f5f9',
                confirmButtonColor: '#06b6d4',
                inputAttributes: { autocapitalize: 'off' }
            });

            if (fileName) {
                const code = window.editor.state.doc.toString();
                const transaction = db.transaction(["wsh_scripts"], "readwrite");
                const store = transaction.objectStore("wsh_scripts");
                
                store.add({
                    name: fileName,
                    content: code,
                    timestamp: new Date().toLocaleString()
                });

                Swal.fire({
                    icon: 'success',
                    title: 'Salvo!',
                    text: 'Versão guardada no IndexedDB.',
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#0f172a',
                    color: '#f1f5f9'
                });
            }
        }

        // Mostrar Histórico
        function showHistory() {
            const transaction = db.transaction(["wsh_scripts"], "readonly");
            const store = transaction.objectStore("wsh_scripts");
            const request = store.getAll();

            request.onsuccess = () => {
                const scripts = request.result;
                if (scripts.length === 0) {
                    Swal.fire({ title: 'Vazio', text: 'Nenhum script salvo ainda.', background: '#0f172a', color: '#f1f5f9' });
                    return;
                }

                let html = '<div class="text-left space-y-2">';
                scripts.forEach(s => {
                    html += `
                        <button onclick="loadScript(${s.id})" class="w-full text-left p-3 rounded bg-slate-800 hover:bg-cyan-900/30 border border-slate-700 transition mb-2">
                            <div class="font-bold text-cyan-400 text-sm">${s.name}</div>
                            <div class="text-[10px] text-slate-500">${s.timestamp}</div>
                        </button>
                    `;
                });
                html += '</div>';

                Swal.fire({
                    title: 'Versões Salvas',
                    html: html,
                    showConfirmButton: false,
                    background: '#0f172a',
                    color: '#f1f5f9'
                });
            };
        }

        // Carregar Script do IDB
        window.loadScript = (id) => {
            const transaction = db.transaction(["wsh_scripts"], "readonly");
            const store = transaction.objectStore("wsh_scripts");
            const request = store.get(id);

            request.onsuccess = () => {
                const script = request.result;
                // Para CM6, precisamos de um dispatch para mudar o conteúdo
                const currentCode = window.editor.state.doc.toString();
                window.editor.dispatch({
                    changes: { from: 0, to: currentCode.length, insert: script.content }
                });
                Swal.close();
            };
        };

        // Rodar Script
        async function runWSH() {
            const code = window.editor.state.doc.toString();
            const output = document.getElementById('terminal-output');
            
            output.innerHTML += `<span class="text-cyan-400 underline">executing script...</span>\n`;

            try {
                // Enviar para a sua API WebBash InfoSystem ou InfoDriver
                const response = await fetch('http://localhost:3000/api/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: code })
                });
                const data = await response.json();
                output.innerHTML += `${data.output || 'Concluído (sem retorno)'}\n`;
            } catch (err) {
                // Mock de sucesso visual se o backend não estiver rodando
                output.innerHTML += `<span class="text-amber-500">[Simulação] Comando enviado com sucesso.</span>\n`;
            }
            
            output.scrollTop = output.scrollHeight;
        }

        function clearTerminal() {
            document.getElementById('terminal-output').innerHTML = '';
        }

        initDB();
    </script>
</body>
</html>
